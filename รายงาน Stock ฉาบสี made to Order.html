<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสต็อกสินค้าออเดอร์รายเดือน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .table-container { overflow-x: auto; max-height: 70vh; }
        thead th { position: sticky; top: 0; background: #1e293b; color: white; z-index: 10; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-slate-200">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">รายงานStock Made to Order</h1>
                    <p class="text-slate-500">จัดการ Texture Render และ Color Skim</p>
                </div>
                <div class="flex flex-wrap gap-2">
                    <select id="monthSelect" class="border rounded-lg px-3 py-2 bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="มกราคม">มกราคม</option>
                        <option value="กุมภาพันธ์">กุมภาพันธ์</option>
                        <option value="มีนาคม">มีนาคม</option>
                        <option value="เมษายน">เมษายน</option>
                        <option value="พฤษภาคม">พฤษภาคม</option>
                        <option value="มิถุนายน">มิถุนายน</option>
                        <option value="กรกฎาคม">กรกฎาคม</option>
                        <option value="สิงหาคม">สิงหาคม</option>
                        <option value="กันยายน">กันยายน</option>
                        <option value="ตุลาคม">ตุลาคม</option>
                        <option value="พฤศจิกายน">พฤศจิกายน</option>
                        <option value="ธันวาคม">ธันวาคม</option>
                    </select>
                    <button onclick="copyToClipboard()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg transition flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy สำหรับ Excel
                    </button>
                </div>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
            <div class="table-container">
                <table class="w-full text-left border-collapse" id="stockTable">
                    <thead>
                        <tr>
                            <th class="p-3 text-sm font-semibold border-b border-slate-300">ประเภท/รหัสสี</th>
                            <th class="p-3 text-sm font-semibold border-b border-slate-300 text-center">ยอดยกมา (ตัน)</th>
                            <th class="p-3 text-sm font-semibold border-b border-slate-300 text-center">ยอดรับ (ตัน)</th>
                            <th class="p-3 text-sm font-semibold border-b border-slate-300 text-center">ยอดจ่าย (ตัน)</th>
                            <th class="p-3 text-sm font-semibold border-b border-slate-300 text-center">คงเหลือ (ตัน)</th>
                            <th class="p-3 text-sm font-semibold border-b border-slate-300">เลข Lot</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Content will be generated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none">
            คัดลอกข้อมูลแล้ว! สามารถวางใน Excel ได้ทันที
        </div>
    </div>

    <script>
        const products = [
            { category: "Texture Render - Worm (2mm.)", items: ["YE01 W.", "YE02 W.", "YE03 W.", "YE04 W.", "OR01 W.", "OR02 W.", "OR03 W.", "OR04 W.", "BL01 W.", "BL02 W.", "GR01 W.", "GR02 W.", "GR03 W.", "RE01 W.", "RE02 W.", "WH01 W.", "WH02 W.", "GB01 W.", "GB02 W.", "GY01 W.", "GY02 W.", "GY03 W.", "GY04 W.", "BR01 W.", "BR02 W.", "BR03 W.", "HB03 W."] },
            { category: "Texture Render - Scrat (1mm.)", items: ["YE01 Sc.", "YE02 Sc.", "YE03 Sc.", "YE04 Sc.", "OR01 Sc.", "OR02 Sc.", "OR03 Sc.", "OR04 Sc.", "BL01 Sc.", "BL02 Sc.", "GR01 Sc.", "GR02 Sc.", "GR03 Sc.", "RE01 Sc.", "RE02 Sc.", "WH01 Sc.", "WH02 Sc.", "GB01 Sc.", "GB02 Sc.", "GY01 Sc.", "GY02 Sc.", "GY03 Sc.", "GY04 Sc.", "BR01 Sc.", "BR02 Sc.", "BR03 Sc.", "HB03 Sc."] },
            { category: "Color Skim", items: ["YE01", "YE02", "YE03", "YE04", "OR01", "OR02", "OR03", "OR04", "GY01", "GY02", "GY03", "GY04", "WH01", "WH02", "BL01", "BL02", "BL03", "GR01", "GR02", "GR03", "RE01", "RE02", "LB01", "LB02", "GB01", "GB02", "GB03", "BR01", "BR02", "BR03", "HB03"] }
        ];

        function initTable() {
            const tbody = document.getElementById('tableBody');
            let html = '';

            products.forEach(group => {
                // Category Row
                html += `<tr class="bg-slate-100 font-bold"><td colspan="6" class="p-3 text-slate-700">${group.category}</td></tr>`;
                
                group.items.forEach(code => {
                    const rowId = code.replace(/[^a-zA-Z0-9]/g, '');
                    html += `
                        <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                            <td class="p-3 font-medium text-slate-700">${code}</td>
                            <td class="p-1"><input type="number" step="0.01" class="w-full p-2 text-center bg-transparent focus:bg-white outline-none focus:ring-1 focus:ring-blue-400 rounded" placeholder="0" oninput="calculateRow('${rowId}')" id="start-${rowId}"></td>
                            <td class="p-1"><input type="number" step="0.01" class="w-full p-2 text-center bg-transparent focus:bg-white outline-none focus:ring-1 focus:ring-green-400 rounded" placeholder="0" oninput="calculateRow('${rowId}')" id="in-${rowId}"></td>
                            <td class="p-1"><input type="number" step="0.01" class="w-full p-2 text-center bg-transparent focus:bg-white outline-none focus:ring-1 focus:ring-red-400 rounded" placeholder="0" oninput="calculateRow('${rowId}')" id="out-${rowId}"></td>
                            <td class="p-1"><input type="number" readonly class="w-full p-2 text-center font-bold text-blue-600 bg-slate-50" value="0.00" id="bal-${rowId}"></td>
                            <td class="p-1"><input type="text" class="w-full p-2 text-sm outline-none focus:ring-1 focus:ring-blue-400 rounded" placeholder="ระบุเลข Lot" id="lot-${rowId}"></td>
                        </tr>
                    `;
                });
            });
            tbody.innerHTML = html;
        }

        function calculateRow(id) {
            const start = parseFloat(document.getElementById(`start-${id}`).value) || 0;
            const receive = parseFloat(document.getElementById(`in-${id}`).value) || 0;
            const pay = parseFloat(document.getElementById(`out-${id}`).value) || 0;
            const balance = (start + receive) - pay;
            
            const balInput = document.getElementById(`bal-${id}`);
            balInput.value = balance.toFixed(2);
            
            if (balance < 0) {
                balInput.classList.add('text-red-600');
                balInput.classList.remove('text-blue-600');
            } else {
                balInput.classList.remove('text-red-600');
                balInput.classList.add('text-blue-600');
            }
        }

        function copyToClipboard() {
            const month = document.getElementById('monthSelect').value;
            let csvContent = `รายงานสต็อกสินค้าประจำเดือน: ${month}\n`;
            csvContent += "ประเภท/รหัสสี\tยอดยกมา\tยอดรับ\tยอดจ่าย\tคงเหลือ\tเลข Lot\n";
            
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length === 1) {
                    csvContent += `${cells[0].innerText}\t\t\t\t\t\n`;
                } else {
                    const code = cells[0].innerText;
                    const start = row.querySelector('input[id^="start-"]').value || '0';
                    const receive = row.querySelector('input[id^="in-"]').value || '0';
                    const pay = row.querySelector('input[id^="out-"]').value || '0';
                    const balance = row.querySelector('input[id^="bal-"]').value || '0';
                    const lot = row.querySelector('input[id^="lot-"]').value || '-';
                    csvContent += `${code}\t${start}\t${receive}\t${pay}\t${balance}\t${lot}\n`;
                }
            });

            const el = document.createElement('textarea');
            el.value = csvContent;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        window.onload = initTable;
    </script>
</body>
</html>
